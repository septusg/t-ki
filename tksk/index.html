<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usagi Comic Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #090d14;
    --bg2:    #0f1520;
    --bg3:    #161e2e;
    --border: #1e2d45;
    --accent: #5b9bd5;
    --acc2:   #3a72a8;
    --text:   #d4e4f7;
    --text2:  #7a9fc0;
    --text3:  #3d5a78;
    --danger: #c4614a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  img { -webkit-touch-callout: none; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── PAGES ── */
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }
  #page-login { align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at 35% 45%, #0d1a2e 0%, #090d14 65%); }
  #page-login.active { display: flex; }

  /* ── LOGIN ── */
  .login-box { width: 360px; padding: 48px 40px; border: 1px solid var(--border); background: var(--bg2); position: relative; }
  .login-box::before { content: ''; position: absolute; top: -1px; left: 20px; right: 20px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .login-title { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 900; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 6px; text-align: center; }
  .login-sub { text-align: center; color: var(--text3); font-size: 11px; letter-spacing: 0.12em; margin-bottom: 32px; }
  .login-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .login-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 13px; color: var(--text3); letter-spacing: 0.08em; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
  .login-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .login-tab:hover { color: var(--text2); }
  .pw-input-wrap { margin-bottom: 14px; }
  .pw-input-wrap input { width: 100%; padding: 12px 16px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 14px; outline: none; letter-spacing: 0.2em; transition: border-color 0.2s; }
  .pw-input-wrap input:focus { border-color: var(--acc2); }
  .pw-input-wrap input::placeholder { letter-spacing: 0.05em; color: var(--text3); }
  .btn-login { width: 100%; padding: 13px; background: var(--accent); color: #090d14; border: none; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.15em; transition: background 0.2s; }
  .btn-login:hover { background: #7ab3e0; }
  .login-error { color: var(--danger); font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }

  /* ── NAV ── */
  .site-nav { position: sticky; top: 0; z-index: 100; background: rgba(9,13,20,0.97); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; height: 56px; gap: 0; }
  .nav-logo { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 17px; color: var(--accent); letter-spacing: 0.1em; cursor: pointer; margin-right: auto; }
  .nav-btn { padding: 6px 14px; font-size: 12px; letter-spacing: 0.08em; color: var(--text3); cursor: pointer; border: none; background: none; font-family: inherit; transition: color 0.2s; }
  .nav-btn:hover { color: var(--accent); }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.locked { color: var(--text3); opacity: 0.5; }
  .nav-btn.locked::after { content: ' 🔒'; font-size: 10px; }
  .nav-sep { color: var(--border); margin: 0 2px; font-size: 11px; }

  /* ── LIBRARY ── */
  .page-inner { padding: 40px 24px; max-width: 1000px; margin: 0 auto; }
  .section-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .section-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 0.1em; }
  .section-count { font-size: 12px; color: var(--text3); }
  .works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 48px; }
  .work-card { cursor: pointer; border: 1px solid var(--border); background: var(--bg2); overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
  .work-card:hover { border-color: var(--acc2); transform: translateY(-2px); }
  .work-cover { aspect-ratio: 3/4; background: var(--bg3); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .work-cover img { width: 100%; height: 100%; object-fit: cover; }
  .work-cover-placeholder { font-family: 'Noto Serif TC', serif; font-size: 36px; color: var(--border); }
  .work-info { padding: 12px; }
  .work-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .work-meta { font-size: 11px; color: var(--text3); }
  .empty-hint { color: var(--text3); font-size: 13px; text-align: center; padding: 48px 0; border: 1px dashed var(--border); letter-spacing: 0.05em; }

  /* ── WORK DETAIL ── */
  .work-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 32px 24px 28px; }
  .work-header-inner { max-width: 800px; margin: 0 auto; }
  .breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: var(--accent); }
  .work-big-title { font-family: 'Noto Serif TC', serif; font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: 0.05em; margin-bottom: 8px; }
  .work-type-badge { display: inline-block; padding: 3px 10px; border: 1px solid var(--border); font-size: 11px; color: var(--text3); letter-spacing: 0.08em; }
  .chapter-list { max-width: 800px; margin: 0 auto; padding: 32px 24px; }

  /* chapter card with cover */
  .chapter-item { display: flex; align-items: center; margin-bottom: 8px; border: 1px solid var(--border); background: var(--bg2); cursor: pointer; transition: border-color 0.2s, background 0.2s; overflow: hidden; }
  .chapter-item:hover { border-color: var(--acc2); background: var(--bg3); }
  .chapter-thumb { width: 72px; height: 72px; flex-shrink: 0; background: var(--bg3); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .chapter-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .chapter-thumb-placeholder { font-size: 22px; color: var(--border); font-family: 'Noto Serif TC', serif; }
  .chapter-info { flex: 1; padding: 14px 18px; }
  .chapter-num { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 900; color: var(--acc2); margin-bottom: 2px; }
  .chapter-name { font-size: 14px; color: var(--text); }
  .chapter-count { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ── ILLUST POST LIST (article style) ── */
  .post-list { max-width: 720px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .post-list-item { border: 1px solid var(--border); background: var(--bg2); cursor: pointer; transition: border-color 0.2s, transform 0.15s; display: flex; overflow: hidden; }
  .post-list-item:hover { border-color: var(--acc2); transform: translateY(-1px); }
  .post-list-cover { width: 140px; height: 100px; flex-shrink: 0; background: var(--bg3); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .post-list-cover img { width: 100%; height: 100%; object-fit: cover; }
  .post-list-cover-ph { font-size: 28px; color: var(--border); }
  .post-list-body { flex: 1; padding: 14px 18px; display: flex; flex-direction: column; justify-content: center; gap: 6px; min-width: 0; }
  .post-list-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .post-list-excerpt { font-size: 12px; color: var(--text3); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .post-list-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  @media(max-width:480px) { .post-list-cover { width: 100px; height: 80px; } }

  /* ── VIEWER ── */
  #page-viewer { background: #000; }
  .viewer-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid #1a2a40; display: flex; align-items: center; padding: 0 16px; height: 52px; gap: 8px; transform: translateY(0); transition: transform 0.3s; }
  .viewer-nav.hidden { transform: translateY(-100%); }
  .viewer-title { flex: 1; font-size: 13px; color: #6a8fa8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .viewer-close { padding: 5px 12px; font-size: 11px; color: #4a6a85; cursor: pointer; border: none; background: none; font-family: inherit; transition: color 0.2s; }
  .viewer-close:hover { color: #7ab3e0; }
  .viewer-mode-label { font-size: 11px; color: #3a5a75; letter-spacing: 0.1em; border: 1px solid #1a2a40; padding: 4px 10px; }
  .viewer-strip { padding-top: 52px; }
  .strip-img { display: block; width: 100%; max-width: 720px; margin: 0 auto; }
    /* ── PAGED VIEWER — scroll-snap carousel ── */
  .paged-carousel {
    position: fixed; inset: 0; top: 52px;
    display: flex;
    overflow-x: scroll;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: #000;
  }
  .paged-carousel.rtl { flex-direction: row-reverse; }
  .paged-carousel::-webkit-scrollbar { display: none; }
  .paged-slide {
    flex: 0 0 100vw;
    width: 100vw;
    height: calc(100vh - 52px);
    scroll-snap-align: start;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .paged-slide img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    user-select: none; -webkit-user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
    draggable: false;
  }
  .paged-counter-overlay {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #6a8fa8;
    font-size: 12px; padding: 4px 14px; border-radius: 20px;
    pointer-events: none; z-index: 201; letter-spacing: 0.06em;
    transition: opacity 0.25s;
  }
  .paged-counter-overlay.arr-hidden { opacity: 0; }

  .paged-arrow {
    position: fixed; top: 50%; z-index: 220;
    transform: translateY(-50%);
    width: 52px; height: 88px;
    background: rgba(0,0,0,0.35);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: rgba(255,255,255,0.65);
    transition: opacity 0.25s, background 0.2s, color 0.2s;
    user-select: none; -webkit-user-select: none;
  }
  .paged-arr-left  { left:  0; border-radius: 0 6px 6px 0; }
  .paged-arr-right { right: 0; border-radius: 6px 0 0 6px; }
  .paged-arrow:hover { background: rgba(0,0,0,0.62); color: #fff; }
  .paged-arrow.arr-end    { opacity: 0.15 !important; pointer-events: none !important; }
  .paged-arrow.arr-hidden { opacity: 0   !important; pointer-events: none !important; }/* illust post article viewer */
  .post-article { max-width: 680px; margin: 0 auto; padding: 32px 24px 60px; }
  .post-article-title { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .post-article-meta { font-size: 12px; color: var(--text3); margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  /* text block */
  .post-block-text { font-size: 14px; color: var(--text2); line-height: 1.9; white-space: pre-wrap; margin-bottom: 20px; }
  /* image block */
  .post-block-img { margin-bottom: 12px; }
  .post-block-img img { display: block; width: 100%; cursor: pointer; border: 1px solid var(--border); transition: opacity 0.2s; }
  .post-block-img img:hover { opacity: 0.9; }
  /* multi-image grid */
  .post-block-imgs { display: grid; gap: 4px; margin-bottom: 12px; }
  .post-block-imgs.cols-1 { grid-template-columns: 1fr; }
  .post-block-imgs.cols-2 { grid-template-columns: 1fr 1fr; }
  .post-block-imgs.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .post-block-imgs img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; border: 1px solid var(--border); transition: opacity 0.2s; }
  .post-block-imgs img:hover { opacity: 0.9; }

  /* gallery grid (fallback for albums without captions) */
  .viewer-gallery { padding-top: 52px; columns: 2; column-gap: 4px; padding-bottom: 4px; }
  @media(min-width:600px){.viewer-gallery{columns:3;}}
  @media(min-width:900px){.viewer-gallery{columns:4;}}
  .gallery-img { display: block; width: 100%; margin-bottom: 4px; cursor: pointer; transition: opacity 0.2s; break-inside: avoid; }
  .gallery-img:hover { opacity: 0.8; }

  /* lightbox */
  .lightbox { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.97); display: none; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; }
  .lightbox-close { position: absolute; top: 16px; right: 20px; font-size: 28px; color: #3a5a75; cursor: pointer; line-height: 1; }
  .lightbox-close:hover { color: #7ab3e0; }
  .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); font-size: 32px; color: #2a4a65; cursor: pointer; padding: 20px; user-select: none; }
  .lightbox-prev:hover, .lightbox-next:hover { color: #7ab3e0; }
  .lightbox-prev { left: 0; }
  .lightbox-next { right: 0; }

  /* ── ADMIN ── */
  .admin-inner { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
  .admin-title { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 900; color: var(--accent); margin-bottom: 28px; letter-spacing: 0.12em; }
  .admin-section { margin-bottom: 40px; }
  .admin-section-title { font-size: 11px; letter-spacing: 0.14em; color: var(--text3); margin-bottom: 16px; text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .field-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 0; }
  .field label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.06em; }
  .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--acc2); }
  .field textarea { min-height: 80px; resize: vertical; }
  select option { background: var(--bg3); }
  .btn { padding: 9px 20px; font-size: 12px; letter-spacing: 0.08em; cursor: pointer; font-family: inherit; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #090d14; }
  .btn-primary:hover { background: #7ab3e0; }
  .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--acc2); color: var(--text); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 11px; }
  .work-list-item { border: 1px solid var(--border); background: var(--bg2); margin-bottom: 10px; overflow: hidden; }
  .work-list-header { display: flex; align-items: center; cursor: pointer; gap: 10px; }
  .work-list-header:hover { background: var(--bg3); }
  /* cover thumbnail in admin list */
  .work-list-cover { width: 48px; height: 48px; flex-shrink: 0; background: var(--bg3); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .work-list-cover img { width: 100%; height: 100%; object-fit: cover; }
  .work-list-cover-ph { font-size: 18px; color: var(--border); font-family: 'Noto Serif TC', serif; }
  .work-list-toggle { padding: 14px 0 14px 14px; color: var(--text3); transition: transform 0.2s; font-size: 11px; }
  .work-list-toggle.open { transform: rotate(90deg); }
  .work-list-name { flex: 1; font-size: 14px; padding: 14px 0; }
  .work-list-type { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; }
  .work-list-actions { display: flex; gap: 6px; padding: 0 14px; }
  .work-list-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .chapter-edit-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--bg3); }
  .chapter-edit-name { flex: 1; font-size: 13px; color: var(--text2); }
  .chapter-edit-count { font-size: 11px; color: var(--text3); }
  .pw-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* post editor */
  .post-editor { border: 1px solid var(--border); background: var(--bg3); padding: 16px; margin-bottom: 10px; }
  .post-editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 12px; color: var(--text3); letter-spacing: 0.06em; }
  .post-preview-imgs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .post-preview-img { width: 60px; height: 60px; object-fit: cover; border: 1px solid var(--border); }

  .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; font-size: 13px; opacity: 0; transform: translateY(8px); transition: all 0.3s; pointer-events: none; letter-spacing: 0.05em; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--accent); }
  .toast.error { border-color: var(--danger); }

  .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 32px; }
  .modal-title { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 900; color: var(--accent); margin-bottom: 24px; letter-spacing: 0.08em; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }

  /* mini password modal */
  .mini-modal { background: var(--bg2); border: 1px solid var(--border); width: 100%; max-width: 320px; padding: 32px; }

  .reveal { opacity: 0; transform: translateY(10px); transition: opacity 0.35s, transform 0.35s; }
  .reveal.visible { opacity: 1; transform: none; }
  @media(max-width:480px){ .works-grid{grid-template-columns:repeat(2,1fr);} .pw-settings{grid-template-columns:1fr;} }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="page-login" class="page active">
  <div class="login-box">
    <div class="login-title">Usagi Comic Reader</div>
    <div class="login-sub">PRIVATE READING ROOM</div>
    <div class="login-tabs">
      <div class="login-tab active" onclick="selectLoginTab('manga',this)">漫畫</div>
      <div class="login-tab" onclick="selectLoginTab('illust',this)">插圖</div>
    </div>
    <div class="pw-input-wrap">
      <input type="password" id="pw-input" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">進入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ══ LIBRARY ══ -->
<div id="page-library" class="page">
  <nav class="site-nav">
    <div class="nav-logo" onclick="goHome()">閱覽室</div>
    <button class="nav-btn" id="nav-manga" onclick="navClickSection('manga')">漫畫</button>
    <span class="nav-sep">·</span>
    <button class="nav-btn" id="nav-illust" onclick="navClickSection('illust')">插圖</button>
    <button class="nav-btn" onclick="logout()" style="margin-left:8px">登出</button>
  </nav>
  <div class="page-inner">
    <div id="manga-section">
      <div class="section-header">
        <div class="section-title">漫畫</div>
        <div class="section-count" id="manga-count"></div>
      </div>
      <div class="works-grid" id="manga-grid"></div>
    </div>
    <div id="illust-section">
      <div class="section-header">
        <div class="section-title">插圖</div>
        <div class="section-count" id="illust-count"></div>
      </div>
      <div class="works-grid" id="illust-grid"></div>
    </div>
  </div>
</div>

<!-- ══ WORK DETAIL ══ -->
<div id="page-work" class="page">
  <nav class="site-nav">
    <div class="nav-logo" onclick="goHome()">Usagi</div>
    <button class="nav-btn" onclick="goHome()">← 返回</button>
    <button class="nav-btn" onclick="logout()" style="margin-left:auto">登出</button>
  </nav>
  <div class="work-header">
    <div class="work-header-inner">
      <div class="breadcrumb">
        <span onclick="goHome()">首頁</span><span>›</span>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let STATE = {
  // loggedIn: Set of unlocked sections. 'admin' means all access.
  unlocked: new Set(), // e.g. 'manga', 'illust', 'admin'
  passwords: { manga: '', illust: 'ki' },
  works: [],
  viewerImages: [],    // flat array for manga/lightbox
  viewerPosts: [],     // array of {images, caption} for illust post feed
  viewerMode: 'strip',
  viewerIndex: 0,
  currentWorkId: null,
  editingWorkId: null,
  editingChapterId: null,
  editingWorkIdForChapter: null,
  editingPostId: null,
  editingPostWorkId: null,
  pendingUnlockSection: null, // which section user is trying to unlock
  lightboxImages: [],
  lightboxIndex: 0,

};
const IS_MOBILE = (function() {
  try {
    if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return true;
  } catch(e) {}
  try {
    return /Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent || '');
  } catch(e) {}
  return false;
})();


// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

function loadLocalData() {
  const saved = localStorage.getItem('manga-gallery-data');
  if (!saved) return null;
  try { return JSON.parse(saved); } catch(e) { return null; }
}

async function loadRemoteData() {
  try {
    const r = await fetch('data.json?ts=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return null;
    const d = await r.json();
    if (d && Array.isArray(d.works)) return d;
  } catch(e) {}
  return null;
}

async function init() {
  const remote = await loadRemoteData();
  if (remote && remote.works) STATE.works = remote.works;

  const local = loadLocalData();
  if (local) {
    if (local.passwords) STATE.passwords = { ...STATE.passwords, ...local.passwords };
    if (!remote && local.works) STATE.works = local.works;
  }

  STATE.passwords.manga = '';
  document.addEventListener('keydown', handleKey);
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });
}

function save() {
  localStorage.setItem('manga-gallery-data', JSON.stringify({
    passwords: STATE.passwords,
    works: STATE.works,
  }));
}


// ══════════════════════════════════════════
// AUTH — multi-section unlock system
// ══════════════════════════════════════════
let loginTarget = 'manga';

function selectLoginTab(type, el) {
  loginTarget = type;
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('login-error').textContent = '';
}

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (loginTarget === 'admin') {
    const err = document.getElementById('login-error');
    err.textContent = '請使用 admin.html';
    setTimeout(() => err.textContent = '', 2200);
    return;
  }
  if (pw === STATE.passwords[loginTarget]) {
    document.getElementById('pw-input').value = '';
    document.getElementById('login-error').textContent = '';
    STATE.unlocked.add(loginTarget);
    showPage('library');
    renderLibrary(loginTarget);
  } else {
    const err = document.getElementById('login-error');
    err.textContent = '密碼錯誤';
    setTimeout(() => err.textContent = '', 2000);
  }
}

// Called when nav button for a locked section is clicked
function navClickSection(type) {
  if (STATE.unlocked.has(type) || STATE.unlocked.has('admin')) {
    // already unlocked — just switch
    showPage('library');
    renderLibrary(type);
  } else {
    // need password
    STATE.pendingUnlockSection = type;
    const label = type === 'manga' ? '漫畫區' : '插圖區';
    document.getElementById('modal-unlock-title').textContent = '輸入' + label + '密碼';
    document.getElementById('unlock-input').value = '';
    document.getElementById('unlock-error').textContent = '';
    openModal('modal-unlock');
    setTimeout(() => document.getElementById('unlock-input').focus(), 100);
  }
}

function doUnlock() {
  const pw = document.getElementById('unlock-input').value;
  const type = STATE.pendingUnlockSection;
  if (pw === STATE.passwords[type]) {
    STATE.unlocked.add(type);
    closeModal('modal-unlock');
    showPage('library');
    renderLibrary(type);
  } else {
    const err = document.getElementById('unlock-error');
    err.textContent = '密碼錯誤';
    setTimeout(() => err.textContent = '', 2000);
  }
}

// Admin nav: go to manga/illust section (admin always has access)
function adminGoSection(type) {
  showPage('library');
  renderLibrary(type);
}

function logout() {
  STATE.unlocked = new Set();
  showPage('login');
}

function isUnlocked(type) {
  return STATE.unlocked.has(type) || STATE.unlocked.has('admin');
}

// ══════════════════════════════════════════
// PAGES
// ══════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  if (isUnlocked('admin')) {
    // admin: return to whichever section was last viewed, or show admin
    showPage('admin');
    renderAdmin();
  } else {
    showPage('library');
    // show first unlocked section
    const section = STATE.unlocked.has('manga') ? 'manga' : 'illust';
    renderLibrary(section);
  }
}

// ══════════════════════════════════════════
// LIBRARY
// ══════════════════════════════════════════
function renderLibrary(activeSection) {
  const mangaWorks = STATE.works.filter(w => w.type === 'manga');
  const illustWorks = STATE.works.filter(w => w.type === 'illust');
  document.getElementById('manga-count').textContent = mangaWorks.length + ' 部';
  document.getElementById('illust-count').textContent = illustWorks.length + ' 部';
  renderGrid('manga-grid', mangaWorks);
  renderGrid('illust-grid', illustWorks);

  // show/hide sections based on unlock state
  const showManga = isUnlocked('manga');
  const showIllust = isUnlocked('illust');
  document.getElementById('manga-section').style.display = showManga ? '' : 'none';
  document.getElementById('illust-section').style.display = showIllust ? '' : 'none';

  // nav button states
  const navManga = document.getElementById('nav-manga');
  const navIllust = document.getElementById('nav-illust');
  navManga.classList.toggle('active', activeSection === 'manga');
  navIllust.classList.toggle('active', activeSection === 'illust');
  navManga.classList.toggle('locked', !showManga);
  navIllust.classList.toggle('locked', !showIllust);

  // if both unlocked, show only the active one
  if (showManga && showIllust) {
    document.getElementById('manga-section').style.display = activeSection === 'manga' ? '' : 'none';
    document.getElementById('illust-section').style.display = activeSection === 'illust' ? '' : 'none';
  }
}

function renderGrid(id, works) {
  const el = document.getElementById(id);
  if (!works.length) { el.innerHTML = '<div class="empty-hint">尚無作品</div>'; return; }
  el.innerHTML = works.map(w => `
    <div class="work-card reveal" onclick="openWork('${w.id}')">
      <div class="work-cover">
        ${w.cover ? `<img src="${esc(w.cover)}" loading="lazy">` : `<div class="work-cover-placeholder">${w.title.charAt(0)}</div>`}
      </div>
      <div class="work-info">
        <div class="work-title">${esc(w.title)}</div>
        <div class="work-meta">${w.type === 'manga' ? w.chapters.length + ' 話' : (w.chapters||[]).length + ' 貼文'}</div>
      </div>
    </div>
  `).join('');
  setTimeout(() => el.querySelectorAll('.reveal').forEach(e => e.classList.add('visible')), 50);
}

// ══════════════════════════════════════════
// WORK DETAIL
// ══════════════════════════════════════════
function openWork(id) {
  const w = STATE.works.find(x => x.id === id);
  if (!w) return;
  STATE.currentWorkId = id;
  document.getElementById('work-section-label').textContent = w.type === 'manga' ? '漫畫' : '插圖';
  document.getElementById('work-breadcrumb-title').textContent = w.title;
  document.getElementById('work-detail-title').textContent = w.title;
  document.getElementById('work-type-badge').textContent =
    w.type === 'illust' ? '插圖集' : (w.readMode === 'paged' ? '頁漫' : '條漫');

  const cl = document.getElementById('chapter-list');
  if (w.type === 'manga') {
    renderChapterList(cl, w);
  } else {
    renderAlbumList(cl, w);
  }
  showPage('work');
}

function renderChapterList(cl, w) {
  if (!w.chapters || !w.chapters.length) {
    cl.innerHTML = '<div class="empty-hint">尚無話數</div>'; return;
  }
  cl.innerHTML = w.chapters.map((c, i) => {
    const thumb = c.cover || (c.images && c.images[0]) || '';
    return `
      <div class="chapter-item reveal" onclick="openChapter('${w.id}','${c.id}')">
        <div class="chapter-thumb">
          ${thumb ? `<img src="${esc(thumb)}" loading="lazy">` : `<div class="chapter-thumb-placeholder">${String(i+1).padStart(2,'0')}</div>`}
        </div>
        <div class="chapter-info">
          <div class="chapter-num">${String(i+1).padStart(2,'0')}</div>
          <div class="chapter-name">${esc(c.title)}</div>
          <div class="chapter-count">${(c.images||[]).length} 張</div>
        </div>
      </div>`;
  }).join('');
  setTimeout(() => cl.querySelectorAll('.reveal').forEach(e => e.classList.add('visible')), 50);
}

function renderAlbumList(cl, w) {
  const posts = w.chapters || [];
  if (!posts.length) { cl.innerHTML = '<div class="empty-hint">尚無貼文</div>'; return; }
  cl.innerHTML = '<div class="post-list">' + posts.map((p, i) => {
    const coverUrl = p.cover || (p.images && p.images[0]) || '';    const coverHtml = coverUrl
      ? `<img src="${esc(coverUrl)}" loading="lazy">`
      : `<div class="post-list-cover-ph">🖼</div>`;
    // title = first line of caption, or fallback
    const lines = (p.caption || '').split('\n');
    const title = p.title || lines[0] || '（未命名貼文）';
    // excerpt = remaining caption text
    const excerptLines = p.title ? lines : lines.slice(1);
    const excerpt = excerptLines.join(' ').trim();
    return `
      <div class="post-list-item reveal" onclick="openPost('${w.id}','${p.id}')">
        <div class="post-list-cover">${coverHtml}</div>
        <div class="post-list-body">
          <div class="post-list-title">${esc(title)}</div>
          ${excerpt ? `<div class="post-list-excerpt">${esc(excerpt)}</div>` : ''}
          <div class="post-list-meta">${(p.images||[]).length} 張圖片</div>
        </div>
      </div>`;
  }).join('') + '</div>';
  setTimeout(() => cl.querySelectorAll('.reveal').forEach(e => e.classList.add('visible')), 50);
}

// ══════════════════════════════════════════
// VIEWER — MANGA
// ══════════════════════════════════════════
function openChapter(workId, chapterId) {
  const w = STATE.works.find(x => x.id === workId);
  const c = w.chapters.find(x => x.id === chapterId);
  if (!c || !c.images || !c.images.length) { toast('此話尚無圖片', 'error'); return; }
  STATE.viewerImages = c.images;
  STATE.viewerIndex = 0;
  document.getElementById('viewer-title').textContent = w.title + ' — ' + c.title;
  showPage('viewer');
  setMode(c.readMode || w.readMode || 'strip');
}

// ══════════════════════════════════════════
// VIEWER — ILLUST POST (single post full view)
// ══════════════════════════════════════════
function openPost(workId, postId) {
  const w = STATE.works.find(x => x.id === workId);
  const p = w.chapters.find(x => x.id === postId);
  if (!p) return;
  STATE.viewerPosts = [p];
  STATE.viewerImages = p.images || [];
  STATE.viewerIndex = 0;
  document.getElementById('viewer-title').textContent = w.title;
  showPage('viewer');
  setMode('illust-post');
}

function setMode(mode) {
  STATE.viewerMode = mode;
  const label = document.getElementById('viewer-mode-label');
  label.textContent = mode === 'strip' ? '條漫' : mode === 'paged' ? '頁漫' : '';
  const nav = document.getElementById('viewer-nav');
  const content = document.getElementById('viewer-content');
  window.onscroll = null;
  PAGED_UI.exitPaged();

  if (mode === 'strip') {
    nav.classList.remove('hidden');
    content.innerHTML = `<div class="viewer-strip" id="viewer-strip">${
      STATE.viewerImages.map(src => `<img class="strip-img" src="${esc(src)}" loading="lazy">`).join('')
    }</div>`;
    bindStripTapToggle();
  } else if (mode === 'paged') {
    nav.classList.remove('hidden');
    renderPaged();
  } else if (mode === 'illust-post') {
    nav.classList.remove('hidden');
    const p = STATE.viewerPosts[0];
    // Parse body into blocks: lines starting with [img:URL] are image blocks, rest is text
    // Format: any line that is a plain URL (http...) = image; text lines = text block
    // We merge consecutive text lines into one block
    let allImgUrls = p.images || [];
    let imgIdx = 0; // for lightbox index tracking across blocks
    const body = p.body || ''; // structured body if present
    let blocksHtml = '';

    if (body) {
      // Parse structured body: segments separated by blank lines or [img] markers
      // Each paragraph = text block; each URL line = image
      const lines = body.split('\n');
      let textBuf = [];
      const flushText = () => {
        if (!textBuf.length) return;
        const t = textBuf.join('\n').trim();
        if (t) blocksHtml += `<div class="post-block-text">${esc(t)}</div>`;
        textBuf = [];
      };
      for (const line of lines) {
        const trimmed = line.trim();
        if (/^https?:\/\//i.test(trimmed)) {
          flushText();
          const li = imgIdx++;
          blocksHtml += `<div class="post-block-img"><img src="${esc(trimmed)}" loading="lazy" onclick="openLightboxArr(${JSON.stringify(allImgUrls)},${li})"></div>`;
        } else {
          textBuf.push(line);
        }
      }
      flushText();
    } else {
      // Legacy: images array + caption text
      const imgs = allImgUrls;
      if (imgs.length === 1) {
        blocksHtml += `<div class="post-block-img"><img src="${esc(imgs[0])}" loading="lazy" onclick="openLightboxArr(${JSON.stringify(imgs)},0)"></div>`;
      } else if (imgs.length > 1) {
        const cols = imgs.length === 2 ? 'cols-2' : 'cols-3';
        blocksHtml += `<div class="post-block-imgs ${cols}">` +
          imgs.map((src,i) => `<img src="${esc(src)}" loading="lazy" onclick="openLightboxArr(${JSON.stringify(imgs)},${i})">`).join('') +
          `</div>`;
      }
      if (p.caption) {
        blocksHtml += `<div class="post-block-text">${esc(p.caption)}</div>`;
      }
    }

    const titleHtml = p.title ? `<div class="post-article-title">${esc(p.title)}</div>` : '';
    const metaHtml = `<div class="post-article-meta">${allImgUrls.length} 張圖片</div>`;
    content.innerHTML = `<div style="padding-top:52px"><div class="post-article">${titleHtml}${metaHtml}${blocksHtml}</div></div>`;
  }
}

function bindStripTapToggle() {
  const strip = document.getElementById('viewer-strip');
  if (!strip) return;

  strip.querySelectorAll('img').forEach(img => { img.ondragstart = (e) => e.preventDefault(); });

  strip._wasDragging = false;
  strip._tapOk = false;

  let tDown = false, tStartX = 0, tStartY = 0, tStartT = 0, tMoved = false;

  strip.addEventListener('pointerdown', (e) => {
    if (!IS_MOBILE || e.pointerType != 'touch') return;
    tDown = true;
    tMoved = false;
    strip._wasDragging = false;
    strip._tapOk = false;
    tStartX = e.clientX;
    tStartY = e.clientY;
    tStartT = Date.now();
    try { strip.setPointerCapture(e.pointerId); } catch(_) {}
  }, { passive: true });

  strip.addEventListener('pointermove', (e) => {
    if (!tDown || e.pointerType != 'touch') return;
    const dx = e.clientX - tStartX;
    const dy = e.clientY - tStartY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
      tMoved = true;
      strip._wasDragging = true;
    }
  }, { passive: true });

  strip.addEventListener('pointerup', (e) => {
    if (!tDown || e.pointerType != 'touch') return;
    tDown = false;
    const dt = Date.now() - tStartT;
    if (!tMoved && dt < 250) strip._tapOk = true;
  }, { passive: true });

  strip.addEventListener('pointercancel', (e) => {
    if (e && e.pointerType == 'touch') {
      tDown = false;
      tMoved = false;
      strip._wasDragging = true;
      strip._tapOk = false;
    }
  }, { passive: true });

  strip.addEventListener('click', () => {
    if (strip._wasDragging) return;
    if (IS_MOBILE) {
      if (!strip._tapOk) return;
      strip._tapOk = false;
    }
    const nav = document.getElementById('viewer-nav');
    if (!nav) return;
    if (nav.classList.contains('hidden')) nav.classList.remove('hidden');
    else nav.classList.add('hidden');
  });
}

// ══════════════════════════════════════════
// 頁漫 UI 全域控制器
// ══════════════════════════════════════════
const PAGED_UI = {
  timer: null,
  hoverMoveBound: false,
  hoverLeaveBound: false,
  nav:     () => document.getElementById('viewer-nav'),
  counter: () => document.getElementById('paged-counter'),
  arrPrev: () => document.getElementById('paged-arr-prev'),
  arrNext: () => document.getElementById('paged-arr-next'),

  show() {
    clearTimeout(this.timer);
    const nav = this.nav(), ctr = this.counter(), ap = this.arrPrev(), an = this.arrNext();
    if (nav) nav.classList.remove('hidden');
    if (ctr) ctr.classList.remove('arr-hidden');
    if (ap)  ap.classList.remove('arr-hidden');
    if (an)  an.classList.remove('arr-hidden');
    this.timer = setTimeout(() => this.hide(), 2500);
  },

  hide() {
    const nav = this.nav(), ctr = this.counter(), ap = this.arrPrev(), an = this.arrNext();
    if (nav) nav.classList.add('hidden');
    if (ctr) ctr.classList.add('arr-hidden');
    if (ap)  ap.classList.add('arr-hidden');
    if (an)  an.classList.add('arr-hidden');
  },

  syncArrowState() {
    const nav = this.nav(), ap = this.arrPrev(), an = this.arrNext();
    if (!ap || !an) return;
    if (nav && nav.classList.contains('hidden')) {
      ap.classList.add('arr-hidden');
      an.classList.add('arr-hidden');
    } else {
      ap.classList.remove('arr-hidden');
      an.classList.remove('arr-hidden');
    }
  },

  bindArrowHover() {
    if (IS_MOBILE || this.hoverMoveBound) return;

    document.addEventListener('mousemove', (e) => {
      if (STATE.viewerMode != 'paged') return;
      if (!document.getElementById('page-viewer').classList.contains('active')) return;

      const ap = this.arrPrev(), an = this.arrNext();
      if (!ap || !an || ap.style.display == 'none' || an.style.display == 'none') return;

      const inRect = (r) => e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
      const rp = ap.getBoundingClientRect();
      const rn = an.getBoundingClientRect();

      if (inRect(rp) || inRect(rn)) {
        ap.classList.remove('arr-hidden');
        an.classList.remove('arr-hidden');
      } else {
        this.syncArrowState();
      }
    });
    this.hoverMoveBound = true;

    if (!this.hoverLeaveBound) {
      document.addEventListener('mouseleave', () => {
        if (STATE.viewerMode == 'paged') this.syncArrowState();
      });
      this.hoverLeaveBound = true;
    }
  },

  updateArrows(idx, total) {
    const ap = this.arrPrev(), an = this.arrNext();
    if (!ap || !an) return;
    ap.classList.toggle('arr-end', idx === 0);
    an.classList.toggle('arr-end', idx === total - 1);
  },

  enterPaged() {
    const ap = this.arrPrev(), an = this.arrNext();
    if (!IS_MOBILE) {
      if (ap) ap.style.display = 'flex';
      if (an) an.style.display = 'flex';
      this.bindArrowHover();
    } else {
      if (ap) ap.style.display = 'none';
      if (an) an.style.display = 'none';
    }
    this.show();
  },

  exitPaged() {
    clearTimeout(this.timer);
    const ap = this.arrPrev(), an = this.arrNext();
    if (ap) ap.style.display = 'none';
    if (an) an.style.display = 'none';
    const nav = this.nav();
    if (nav) nav.classList.remove('hidden');
  }
};

function pagedGetWidth(carousel) {
  const r = carousel.getBoundingClientRect();
  return r.width || window.innerWidth || 1;
}

function pagedScrollToIndex(carousel, idx, smooth) {
  const slide = carousel ? carousel.querySelector(".paged-slide[data-idx='" + idx + "']") : null;
  const w = pagedGetWidth(carousel);
  const target = slide ? slide.offsetLeft : (STATE.viewerImages.length - 1 - idx) * w;
  const behavior = smooth ? 'smooth' : 'auto';
  try { carousel.scrollTo({ left: target, behavior: behavior }); }
  catch (e) { carousel.style.scrollBehavior = behavior; carousel.scrollLeft = target; }
  if (smooth) setTimeout(() => { if (carousel) carousel.style.scrollBehavior = 'auto'; }, 420);
}


function pagedIndexFromScroll(carousel) {
  if (!carousel) return 0;
  const slides = carousel.querySelectorAll('.paged-slide');
  if (!slides || !slides.length) return 0;

  const cr = carousel.getBoundingClientRect();
  const cx = cr.left + cr.width / 2;

  let bestIdx = 0;
  let bestDist = 1e18;

  for (let i = 0; i < slides.length; i++) {
    const r = slides[i].getBoundingClientRect();
    const scx = r.left + r.width / 2;
    const d = Math.abs(scx - cx);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }

  const idx = parseInt(slides[bestIdx].getAttribute('data-idx') || '0', 10);
  return isNaN(idx) ? 0 : idx;
}

function renderPaged() {
  const imgs = STATE.viewerImages;
  const i    = STATE.viewerIndex;
  const content = document.getElementById('viewer-content');

  const slides = imgs.map((src, idx) =>
    `<div class="paged-slide" data-idx="${idx}">` +
    `<img src="${esc(src)}" loading="${idx <= i + 2 ? 'eager' : 'lazy'}">` +
    `</div>`
  ).join('');

  content.innerHTML =
    `<div class="paged-carousel rtl" id="paged-carousel">${slides}</div>` +
    `<div class="paged-counter-overlay arr-hidden" id="paged-counter">${i+1} / ${imgs.length}</div>`;

  const carousel = document.getElementById('paged-carousel');

  carousel.querySelectorAll('img').forEach(img => { img.ondragstart = (e) => e.preventDefault(); });

  requestAnimationFrame(() => {
    pagedScrollToIndex(carousel, i, false);
    PAGED_UI.enterPaged();
    PAGED_UI.updateArrows(i, imgs.length);
  });

  let raf = 0;
  let tmr = 0;
  carousel.addEventListener('scroll', () => {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      raf = 0;
      const idx = pagedIndexFromScroll(carousel);
      const ctr = document.getElementById('paged-counter');
      if (idx >= 0 && idx < imgs.length) {
        STATE.viewerIndex = idx;
        if (ctr) ctr.textContent = (idx + 1) + ' / ' + imgs.length;
        PAGED_UI.updateArrows(idx, imgs.length);
        if (!IS_MOBILE) PAGED_UI.show();
      }
    });
  }, { passive: true });

  carousel._wasDragging = false;

  carousel._tapOk = false;

  let tDown = false, tStartX = 0, tStartY = 0, tStartT = 0, tMoved = false;

  carousel.addEventListener('pointerdown', (e) => {
    if (!IS_MOBILE || e.pointerType != 'touch') return;
    tDown = true;
    tMoved = false;
    carousel._wasDragging = false;
    carousel._tapOk = false;
    tStartX = e.clientX;
    tStartY = e.clientY;
    tStartT = Date.now();
    try { carousel.setPointerCapture(e.pointerId); } catch(_) {}
  }, { passive: true });

  carousel.addEventListener('pointermove', (e) => {
    if (!tDown || e.pointerType != 'touch') return;
    const dx = e.clientX - tStartX;
    const dy = e.clientY - tStartY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
      tMoved = true;
      carousel._wasDragging = true;
    }
  }, { passive: true });

  carousel.addEventListener('pointerup', (e) => {
    if (!tDown || e.pointerType != 'touch') return;
    tDown = false;
    const dt = Date.now() - tStartT;
    if (!tMoved && dt < 250) carousel._tapOk = true;
  }, { passive: true });

  carousel.addEventListener('pointercancel', (e) => {
    if (e && e.pointerType == 'touch') {
      tDown = false;
      tMoved = false;
      carousel._wasDragging = true;
      carousel._tapOk = false;
    }
  }, { passive: true });

  carousel.addEventListener('click', () => {
    if (carousel._wasDragging) return;
    if (IS_MOBILE) {
      if (!carousel._tapOk) return;
      carousel._tapOk = false;
    }
    const nav = document.getElementById('viewer-nav');
    if (!nav) return;
    if (nav.classList.contains('hidden')) PAGED_UI.show();
    else PAGED_UI.hide();
  });

  let dragging = false, startX = 0, startScroll = 0;
  carousel.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'touch') return;
    dragging = true;
    carousel._wasDragging = false;
    startX = e.clientX;
    startScroll = carousel.scrollLeft;
    carousel.style.scrollBehavior = 'auto';
    try { carousel.setPointerCapture(e.pointerId); } catch(_) {}
    e.preventDefault();
  }, { passive: false });

  carousel.addEventListener('pointermove', (e) => {
    if (!dragging || e.pointerType === 'touch') return;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 6) carousel._wasDragging = true;
    carousel.scrollLeft = startScroll - dx;
    e.preventDefault();
  }, { passive: false });

  const endDrag = (e) => {
    if (!dragging || (e && e.pointerType === 'touch')) return;
    dragging = false;
    const w = pagedGetWidth(carousel);
    const snap = Math.round(carousel.scrollLeft / w);
    carousel.style.scrollBehavior = 'smooth';
    carousel.scrollLeft = snap * w;
    setTimeout(() => { if (carousel) carousel.style.scrollBehavior = 'auto'; }, 420);
    setTimeout(() => { carousel._wasDragging = false; }, 60);
  };

  carousel.addEventListener('pointerup', endDrag);
  carousel.addEventListener('pointercancel', () => { dragging = false; carousel._wasDragging = false; });
}

function pagedNav(dir) {
  const n = STATE.viewerIndex + dir;
  if (n < 0 || n >= STATE.viewerImages.length) return;
  STATE.viewerIndex = n;

  const carousel = document.getElementById('paged-carousel');
  if (!carousel) return;

  pagedScrollToIndex(carousel, n, true);

  const ctr = document.getElementById('paged-counter');
  if (ctr) ctr.textContent = (n + 1) + ' / ' + STATE.viewerImages.length;
  PAGED_UI.updateArrows(n, STATE.viewerImages.length);
  PAGED_UI.show();
}

function closeViewer() {
  window.onscroll = null;
  PAGED_UI.exitPaged();
  openWork(STATE.currentWorkId);

// KEYBOARD
// ══════════════════════════════════════════
function handleKey(e) {
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
    if (e.key === 'Escape') closeLightboxDirect();
    return;
  }
  if (!document.getElementById('page-viewer').classList.contains('active')) return;
  if (STATE.viewerMode === 'paged') {
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') pagedNav(-1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') pagedNav(1);
  }
  if (e.key === 'Escape') closeViewer();
}

  const blob = new Blob([JSON.stringify({ passwords: STATE.passwords, works: STATE.works }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'usagi-backup.json';
  a.click();
  toast('已匯出');
}
function importData(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.passwords) STATE.passwords = { ...STATE.passwords, ...d.passwords };
      if (d.works) STATE.works = d.works;
      save(); renderAdmin(); toast('已匯入');
    } catch { toast('JSON 格式錯誤', 'error'); }
  };
  r.readAsText(file);
  input.value = '';
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

init();
</script>
